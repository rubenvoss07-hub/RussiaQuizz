<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Revolution and Collapse — Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Crimson+Pro:ital,wght@0,400;0,500;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" />
<style>
  :root {
    --bg: #1a1410;
    --bg-2: #221a14;
    --paper: #f0e3c8;
    --paper-2: #e3d3b3;
    --paper-dark: #c9b48a;
    --ink: #2a1f15;
    --ink-soft: #4a3826;
    --ink-mute: #7a6a55;
    --accent: #8b1e1e;     /* deep red */
    --accent-2: #c4a253;   /* aged brass */
    --gold: #b8902c;
    --green: #4a6b3a;
    --line: #8a7a5e;
    --shadow: rgba(20, 12, 5, 0.45);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: 'Crimson Pro', Georgia, serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse at top, rgba(60, 30, 15, 0.6), transparent 70%),
      linear-gradient(180deg, #1a1410 0%, #0e0a07 100%);
    background-attachment: fixed;
  }

  /* Subtle film grain / paper texture overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.015) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.015) 0%, transparent 50%);
    z-index: 0;
  }

  .wrap {
    position: relative;
    max-width: 880px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    z-index: 1;
  }

  /* --- Header --- */
  header.hero {
    text-align: center;
    padding: 28px 20px 36px;
    margin-bottom: 24px;
    border-bottom: 1px solid rgba(184, 144, 44, 0.3);
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent-2);
    font-size: 12px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin: 0 0 14px;
  }

  h1.title {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--paper);
    font-size: clamp(28px, 5vw, 46px);
    letter-spacing: 0.05em;
    margin: 0 0 10px;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
  }

  .subtitle {
    color: var(--paper-dark);
    font-style: italic;
    font-size: clamp(15px, 2vw, 18px);
    margin: 0 0 18px;
    opacity: 0.85;
  }

  .meta {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--ink-mute);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .meta .dot { margin: 0 10px; color: var(--accent-2); }

  /* --- Card / Paper Panel --- */
  .panel {
    background:
      linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
    border: 1px solid var(--line);
    border-radius: 4px;
    box-shadow:
      0 20px 50px var(--shadow),
      0 0 0 1px rgba(184, 144, 44, 0.15) inset;
    padding: 32px clamp(20px, 4vw, 44px);
    position: relative;
  }
  .panel::before {
    content: "";
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(138, 122, 94, 0.4);
    pointer-events: none;
    border-radius: 2px;
  }

  /* --- Start screen --- */
  .start-screen .intro {
    text-align: center;
    font-size: 17px;
    line-height: 1.7;
    color: var(--ink-soft);
    margin: 0 auto 28px;
    max-width: 640px;
  }
  .intro strong { color: var(--ink); }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin: 28px 0;
  }
  .stat {
    text-align: center;
    padding: 16px 8px;
    background: rgba(255, 255, 255, 0.25);
    border: 1px solid rgba(138, 122, 94, 0.3);
    border-radius: 3px;
  }
  .stat .num {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    display: block;
    line-height: 1.1;
  }
  .stat .lbl {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-mute);
    text-transform: uppercase;
    margin-top: 6px;
    display: block;
  }

  /* --- Buttons --- */
  .btn {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 13px;
    padding: 14px 36px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: var(--paper);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.18s ease;
    box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2), 0 6px 14px rgba(139, 30, 30, 0.3);
  }
  .btn:hover {
    background: #a82626;
    transform: translateY(-1px);
    box-shadow: 0 5px 0 rgba(0, 0, 0, 0.25), 0 8px 18px rgba(139, 30, 30, 0.4);
  }
  .btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2), 0 3px 6px rgba(139, 30, 30, 0.3);
  }
  .btn.ghost {
    background: transparent;
    color: var(--accent);
    box-shadow: none;
  }
  .btn.ghost:hover {
    background: rgba(139, 30, 30, 0.08);
    color: #6a1414;
  }
  .center { text-align: center; }

  /* --- Question screen --- */
  .progress-bar {
    height: 6px;
    background: rgba(138, 122, 94, 0.25);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 22px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent) 0%, var(--gold) 100%);
    width: 0%;
    transition: width 0.4s ease;
  }

  .q-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--ink-mute);
    text-transform: uppercase;
  }
  .q-header .section-tag {
    color: var(--accent);
    font-weight: 500;
  }

  .question {
    font-family: 'Cinzel', serif;
    font-size: clamp(20px, 3vw, 26px);
    font-weight: 500;
    line-height: 1.4;
    color: var(--ink);
    margin: 0 0 28px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(138, 122, 94, 0.35);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }
  .option {
    text-align: left;
    width: 100%;
    background: rgba(255, 255, 255, 0.35);
    border: 1px solid rgba(138, 122, 94, 0.45);
    color: var(--ink);
    padding: 14px 18px;
    font-family: 'Crimson Pro', serif;
    font-size: 17px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 14px;
    font-weight: 400;
  }
  .option .letter {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 13px;
    width: 28px;
    height: 28px;
    border: 1px solid var(--ink-mute);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    flex-shrink: 0;
    transition: all 0.15s ease;
  }
  .option:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.55);
    border-color: var(--accent-2);
    transform: translateX(2px);
  }
  .option:hover:not(:disabled) .letter {
    border-color: var(--accent-2);
    color: var(--accent);
  }
  .option:disabled { cursor: default; }
  .option.correct {
    background: rgba(74, 107, 58, 0.18);
    border-color: var(--green);
    color: var(--ink);
  }
  .option.correct .letter {
    background: var(--green);
    border-color: var(--green);
    color: var(--paper);
  }
  .option.wrong {
    background: rgba(139, 30, 30, 0.12);
    border-color: var(--accent);
    color: var(--ink);
  }
  .option.wrong .letter {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--paper);
  }
  .option.faded { opacity: 0.55; }

  .feedback {
    background: rgba(255, 255, 255, 0.4);
    border-left: 3px solid var(--accent-2);
    padding: 14px 18px;
    margin-bottom: 22px;
    font-style: italic;
    color: var(--ink-soft);
    line-height: 1.55;
    border-radius: 0 3px 3px 0;
  }
  .feedback .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    font-style: normal;
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .feedback.correct { border-left-color: var(--green); }
  .feedback.correct .label { color: var(--green); }
  .feedback.wrong { border-left-color: var(--accent); }

  .q-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .score-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink-mute);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .score-pill b { color: var(--accent); font-weight: 600; }

  /* --- Results screen --- */
  .result-screen {
    text-align: center;
  }
  .seal {
    width: 130px;
    height: 130px;
    margin: 6px auto 18px;
    border: 3px double var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle, rgba(196, 162, 83, 0.2), transparent);
    position: relative;
  }
  .seal .score-num {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 36px;
    color: var(--accent);
    line-height: 1;
  }
  .seal .score-num small {
    font-size: 16px;
    color: var(--ink-mute);
    font-weight: 500;
  }

  .result-title {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    color: var(--ink);
    margin: 8px 0 14px;
    letter-spacing: 0.04em;
  }
  .result-blurb {
    color: var(--ink-soft);
    font-size: 17px;
    line-height: 1.65;
    max-width: 560px;
    margin: 0 auto 28px;
  }
  .result-blurb i { color: var(--accent); }

  .breakdown {
    text-align: left;
    margin: 24px 0;
    background: rgba(255, 255, 255, 0.25);
    border: 1px solid rgba(138, 122, 94, 0.3);
    padding: 18px 20px;
    border-radius: 3px;
  }
  .breakdown h3 {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin: 0 0 14px;
    color: var(--ink);
    text-align: center;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(138, 122, 94, 0.3);
  }
  .breakdown ul { list-style: none; padding: 0; margin: 0; }
  .breakdown li {
    display: flex;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px dashed rgba(138, 122, 94, 0.2);
    font-size: 15px;
    line-height: 1.4;
  }
  .breakdown li:last-child { border-bottom: none; }
  .breakdown .mark {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    color: var(--paper);
  }
  .breakdown .mark.ok { background: var(--green); }
  .breakdown .mark.no { background: var(--accent); }

  .actions {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 20px;
  }

  footer.foot {
    margin-top: 30px;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(240, 227, 200, 0.4);
    text-transform: uppercase;
  }

  /* Fade transitions */
  .fade-in {
    animation: fadeIn 0.35s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 540px) {
    .wrap { padding: 20px 14px 60px; }
    .stats-row { grid-template-columns: 1fr; }
    .panel { padding: 24px 18px; }
    .actions { flex-direction: column; }
    .actions .btn { width: 100%; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="hero">
    <p class="eyebrow" id="heroEyebrow">&nbsp;</p>
    <h1 class="title" id="heroTitle">&nbsp;</h1>
    <p class="subtitle" id="heroSubtitle">&nbsp;</p>
    <p class="meta" id="heroMeta">&nbsp;</p>
  </header>

  <main id="app"></main>

  <footer class="foot" id="footerText">&nbsp;</footer>
</div>

<script>
  // ============================================================
  //  Quiz engine — questions are loaded from ./questions.json
  //  Edit that file to change the quiz; you do not need to touch
  //  this HTML to add, remove, or rewrite questions.
  // ============================================================

  const QUESTIONS_URL = "questions.json";
  const app = document.getElementById("app");
  const FALLBACK = { title: "Quiz", subtitle: "", eyebrow: "", metaLine: "", footer: "", intro: "", startButton: "Begin", resultTiers: [], questions: [] };
  let CONFIG = { ...FALLBACK };
  let currentIndex = 0;
  let score = 0;
  let answers = [];

  function escapeHtml(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function nl2br(str) {
    return escapeHtml(str).replace(/\n/g, "<br>");
  }

  function setHeader(cfg) {
    document.getElementById("heroEyebrow").innerHTML  = escapeHtml(cfg.eyebrow || "");
    document.getElementById("heroTitle").innerHTML    = escapeHtml(cfg.title || "Quiz");
    document.getElementById("heroSubtitle").innerHTML = escapeHtml(cfg.subtitle || "");
    const meta = cfg.metaLine || "";
    document.getElementById("heroMeta").innerHTML     = escapeHtml(meta).replace(/◆/g, '<span class="dot">&#9670;</span>');
    document.getElementById("footerText").innerHTML   = escapeHtml(cfg.footer || "");
    document.title = (cfg.title || "Quiz") + " — Quiz";
  }

  // ---------- Loader ----------

  async function loadQuiz() {
    renderLoading();
    try {
      const res = await fetch(QUESTIONS_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`Could not fetch ${QUESTIONS_URL} — server returned HTTP ${res.status}.`);
      const data = await res.json();
      validate(data);
      CONFIG = { ...FALLBACK, ...data };
      setHeader(CONFIG);
      renderStart();
    } catch (err) {
      renderError(err);
    }
  }

  function validate(data) {
    if (!data || typeof data !== "object") throw new Error("questions.json must be a JSON object.");
    if (!Array.isArray(data.questions) || data.questions.length === 0) {
      throw new Error("'questions' must be a non-empty array.");
    }
    data.questions.forEach((q, i) => {
      const tag = `Question ${i + 1}`;
      if (!q.question || typeof q.question !== "string") throw new Error(`${tag}: 'question' is required and must be a string.`);
      if (!Array.isArray(q.options) || q.options.length < 2) throw new Error(`${tag}: 'options' must have at least 2 entries.`);
      if (typeof q.correct !== "number" || !Number.isInteger(q.correct) || q.correct < 1 || q.correct > q.options.length) {
        throw new Error(`${tag}: 'correct' must be an integer between 1 and ${q.options.length} (1 = first option).`);
      }
    });
    if (data.resultTiers && !Array.isArray(data.resultTiers)) {
      throw new Error("'resultTiers' must be an array (or omitted).");
    }
  }

  // ---------- Screens ----------

  function renderLoading() {
    app.innerHTML = `
      <section class="panel fade-in" style="text-align:center;">
        <p class="intro" style="margin:0;">Loading quiz…</p>
      </section>
    `;
  }

  function renderError(err) {
    app.innerHTML = `
      <section class="panel result-screen fade-in">
        <h2 class="result-title">Couldn't load the quiz</h2>
        <p class="result-blurb"><b>${escapeHtml(err.message)}</b></p>

        <div class="breakdown">
          <h3>&mdash; How to fix &mdash;</h3>
          <ul style="display:block;">
            <li style="display:list-item;">
              <b>Open via a web server, not <code>file://</code>.</b>
              Browsers block local <code>fetch()</code> for security.
              Either push the folder to GitHub and turn on <i>Pages</i>,
              or from the project folder run<br>
              <code>python3 -m http.server</code><br>
              and open <code>http://localhost:8000</code>.
            </li>
            <li style="display:list-item;">
              <b>Make sure <code>questions.json</code> sits next to <code>index.html</code></b>
              (same folder, same case).
            </li>
            <li style="display:list-item;">
              <b>Check JSON syntax.</b> No trailing commas, every string in double quotes.
              Paste it into <code>jsonlint.com</code> if unsure.
            </li>
            <li style="display:list-item;">
              <b>Each question needs</b> <code>question</code>, <code>options</code> (≥2),
              <code>correct</code> (1-based index), and <code>explanation</code>.
            </li>
          </ul>
        </div>

        <div class="actions">
          <button class="btn" id="retryLoad">Retry</button>
        </div>
      </section>
    `;
    document.getElementById("retryLoad").addEventListener("click", loadQuiz);
  }

  function uniqueSectionCount() {
    return new Set(CONFIG.questions.map(q => q.section).filter(Boolean)).size || 1;
  }
  function estMinutes() {
    return Math.max(1, Math.round(CONFIG.questions.length * 0.33));
  }

  function renderStart() {
    const qN = CONFIG.questions.length;
    app.innerHTML = `
      <section class="panel start-screen fade-in">
        <p class="intro">${nl2br(CONFIG.intro)}</p>
        <div class="stats-row">
          <div class="stat"><span class="num">${qN}</span><span class="lbl">Questions</span></div>
          <div class="stat"><span class="num">${uniqueSectionCount()}</span><span class="lbl">Sections</span></div>
          <div class="stat"><span class="num">~${estMinutes()}</span><span class="lbl">Minutes</span></div>
        </div>
        <div class="center">
          <button class="btn" id="startBtn">${escapeHtml(CONFIG.startButton || "Begin")}</button>
        </div>
      </section>
    `;
    document.getElementById("startBtn").addEventListener("click", () => {
      currentIndex = 0;
      score = 0;
      answers = [];
      renderQuestion();
    });
  }

  function renderQuestion() {
    const raw = CONFIG.questions[currentIndex];
    // Normalise: convert 1-based 'correct' to 0-based 'answer'
    const q = {
      section: raw.section || "",
      q: raw.question,
      options: raw.options,
      answer: raw.correct - 1,
      explain: raw.explanation || ""
    };
    const total = CONFIG.questions.length;
    const progress = (currentIndex / total) * 100;

    app.innerHTML = `
      <section class="panel fade-in">
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
        <div class="q-header">
          <span>Question ${currentIndex + 1} of ${total}</span>
          <span class="section-tag">${escapeHtml(q.section)}</span>
        </div>
        <h2 class="question">${escapeHtml(q.q)}</h2>
        <div class="options" id="options">
          ${q.options.map((opt, i) => `
            <button class="option" data-i="${i}">
              <span class="letter">${String.fromCharCode(65 + i)}</span>
              <span>${escapeHtml(opt)}</span>
            </button>
          `).join("")}
        </div>
        <div id="feedbackSlot"></div>
        <div class="q-footer">
          <span class="score-pill">Score: <b>${score}</b> / ${total}</span>
          <button class="btn" id="nextBtn" style="display:none;">
            ${currentIndex === total - 1 ? "See Results" : "Next Question"}
          </button>
        </div>
      </section>
    `;

    document.querySelectorAll(".option").forEach(btn => {
      btn.addEventListener("click", (e) => onAnswer(e, q));
    });
  }

  function onAnswer(e, q) {
    const btn = e.currentTarget;
    const chosen = parseInt(btn.dataset.i, 10);
    const total = CONFIG.questions.length;
    const isCorrect = chosen === q.answer;

    if (isCorrect) score++;
    answers.push({ q: q.q, chosen, correct: q.answer, isCorrect });

    document.querySelectorAll(".option").forEach((b, i) => {
      b.disabled = true;
      if (i === q.answer) b.classList.add("correct");
      else if (i === chosen) b.classList.add("wrong");
      else b.classList.add("faded");
    });

    document.getElementById("feedbackSlot").innerHTML = `
      <div class="feedback ${isCorrect ? "correct" : "wrong"} fade-in">
        <span class="label">${isCorrect ? "Correct" : "Not quite"}</span>
        ${escapeHtml(q.explain)}
      </div>
    `;

    document.querySelector(".score-pill").innerHTML = `Score: <b>${score}</b> / ${total}`;
    document.querySelector(".progress-fill").style.width =
      (((currentIndex + 1) / total) * 100) + "%";

    const next = document.getElementById("nextBtn");
    next.style.display = "inline-block";
    next.addEventListener("click", () => {
      currentIndex++;
      if (currentIndex >= total) renderResults();
      else renderQuestion();
    }, { once: true });
  }

  function pickTier(pct) {
    const tiers = (CONFIG.resultTiers || []).slice().sort((a, b) => b.minPercent - a.minPercent);
    for (const t of tiers) if (pct >= t.minPercent) return t;
    return { title: `${score} / ${CONFIG.questions.length}`, blurb: "" };
  }

  function renderResults() {
    const total = CONFIG.questions.length;
    const pct = Math.round((score / total) * 100);
    const tier = pickTier(pct);

    const breakdownHtml = answers.map((a, i) => `
      <li>
        <span class="mark ${a.isCorrect ? "ok" : "no"}">${a.isCorrect ? "&#10003;" : "&#10007;"}</span>
        <span><b>Q${i + 1}.</b> ${escapeHtml(a.q)}</span>
      </li>
    `).join("");

    app.innerHTML = `
      <section class="panel result-screen fade-in">
        <div class="seal">
          <div class="score-num">${score}<small> / ${total}</small></div>
        </div>
        <h2 class="result-title">${escapeHtml(tier.title)}</h2>
        <p class="result-blurb">${escapeHtml(tier.blurb)}</p>

        <div class="breakdown">
          <h3>&mdash; Your Answers &mdash;</h3>
          <ul>${breakdownHtml}</ul>
        </div>

        <div class="actions">
          <button class="btn" id="retryBtn">Try Again</button>
          <button class="btn ghost" id="homeBtn">Back to Start</button>
        </div>
      </section>
    `;

    document.getElementById("retryBtn").addEventListener("click", () => {
      currentIndex = 0;
      score = 0;
      answers = [];
      renderQuestion();
    });
    document.getElementById("homeBtn").addEventListener("click", renderStart);
  }

  loadQuiz();
</script>
</body>
</html>
